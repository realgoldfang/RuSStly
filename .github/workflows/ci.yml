name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libgtk-3-dev libxdo-dev

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: brew install gtk+3

      - name: Check
        run: cargo check

  package-linux:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libgtk-3-dev libxdo-dev file
      - run: cargo build --release

      - name: Build .deb
        run: |
          cargo install cargo-deb
          cargo deb
          mkdir -p artifacts
          cp target/debian/*.deb artifacts/

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          mkdir -p AppDir/usr/bin
          cp target/release/russtly AppDir/usr/bin/
          mkdir -p AppDir/usr/share/applications
          cp res/russtly.desktop AppDir/usr/share/applications/russtly.desktop
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp res/icon-256.png AppDir/usr/share/icons/hicolor/256x256/apps/russtly.png
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          mv RuSStly*-x86_64.AppImage artifacts/russtly-$VERSION-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: artifacts/*

  package-macos:
    needs: [check]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS dependencies
        run: brew install gtk+3
      - run: cargo build --release

      - name: Build .dmg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p "RuSStly.app/Contents/MacOS"
          cp target/release/russtly "RuSStly.app/Contents/MacOS/"
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' \
            '<dict>' \
            '  <key>CFBundleName</key><string>RuSStly</string>' \
            '  <key>CFBundleDisplayName</key><string>RuSStly</string>' \
            '  <key>CFBundleExecutable</key><string>russtly</string>' \
            '  <key>CFBundleIdentifier</key><string>com.github.russtly</string>' \
            "  <key>CFBundleVersion</key><string>${VERSION}</string>" \
            "  <key>CFBundleShortVersionString</key><string>${VERSION}</string>" \
            '  <key>CFBundlePackageType</key><string>APPL</string>' \
            '  <key>LSMinimumSystemVersion</key><string>10.15</string>' \
            '</dict>' \
            '</plist>' \
            > "RuSStly.app/Contents/Info.plist"
          mkdir artifacts
          hdiutil create -volname "RuSStly $VERSION" -srcFolder RuSStly.app \
            -ov -format UDZO "artifacts/russtly-$VERSION-x86_64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: artifacts/*

  package-windows:
    needs: [check]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release

      - name: Package .exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $ref = "$env:GITHUB_REF_NAME"
          $ver = if ($ref -match '^v') { $ref.Substring(1) } else { $ref }
          Compress-Archive -Path target/release/russtly.exe,README.md `
            -DestinationPath "artifacts/russtly-${ver}-x86_64.zip"

      - name: Build .msi
        shell: pwsh
        continue-on-error: true
        run: |
          cargo install cargo-wix
          cargo wix

      - name: Collect MSI
        shell: pwsh
        run: |
          if (Test-Path target/wix/*.msi) {
            Copy-Item target/wix/*.msi artifacts/
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: artifacts/*

  release:
    needs: [package-linux, package-macos, package-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mkdir -p release-assets
          cp -r *-packages/* release-assets/
          ls -la release-assets/

      - name: Create date-based release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const tag = `${y}${m}${d}.${context.runNumber}`;

            // Create annotated tag
            await github.rest.git.createRef({
              owner, repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
            core.info(`Created tag ${tag} at ${context.sha.substring(0, 7)}`);

            // Create release
            const release = await github.rest.repos.createRelease({
              owner, repo,
              tag_name: tag,
              name: tag,
              body: `Commit: ${context.sha.substring(0, 7)}`,
              prerelease: true,
            });
            core.info(`Release ${tag} created`);

            // Upload assets
            const assetsDir = 'release-assets';
            if (!fs.existsSync(assetsDir)) return;
            const files = fs.readdirSync(assetsDir);
            for (const file of files) {
              const filePath = path.join(assetsDir, file);
              const stat = fs.statSync(filePath);
              if (!stat.isFile()) continue;
              core.info(`Uploading ${file} (${stat.size} bytes)...`);
              await github.request({
                method: 'POST',
                url: release.data.upload_url,
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': stat.size,
                },
                name: file,
                data: fs.readFileSync(filePath),
              });
            }
            core.info(`Uploaded ${files.length} assets to ${tag}`);
